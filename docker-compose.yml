# ------------------------------------------------------------------
# docker-compose.yml — where-is-my-model
# Four services: nginx (reverse proxy / TLS), frontend (Vite dev), backend (Express), mongo
# Shared bridge network: app-network
# ------------------------------------------------------------------

version: "3.9"

services:
  # ------------------------------------------------------------------
  # Nginx — HTTPS/TLS termination, reverse proxy to frontend & backend
  # ------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - app-network

  # ------------------------------------------------------------------
  # Frontend — Vite development server with hot module reload
  # ------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8080
    networks:
      - app-network

  # ------------------------------------------------------------------
  # Backend — Express + Mongoose API server
  # ------------------------------------------------------------------
  backend:
    build:
      context: ./backend
    ports:
      - "9003:8080"
    env_file:
      - ./backend/.env.development
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network

  # ------------------------------------------------------------------
  # MongoDB — persistent document store (no auth for local dev)
  # ------------------------------------------------------------------
  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh 'mongodb://localhost:27017' --eval \"db.adminCommand('ping')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

# ------------------------------------------------------------------
# Named volumes
# ------------------------------------------------------------------
volumes:
  mongo-data:

# ------------------------------------------------------------------
# Networks
# ------------------------------------------------------------------
networks:
  app-network:
    driver: bridge
