# ======================================================================
# nginx/nginx.conf — where-is-my-model reverse proxy + TLS termination
# ======================================================================

worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---------------------------------------------------------------
    # Logging (JSON-friendly for container stdout)
    # ---------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # ---------------------------------------------------------------
    # HTTP → HTTPS redirect
    # ---------------------------------------------------------------
    server {
        listen 80;
        server_name localhost;

        # Redirect every HTTP request to HTTPS
        return 301 https://$host$request_uri;
    }

    # ---------------------------------------------------------------
    # HTTPS — TLS termination, proxy to frontend + backend
    # ---------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name localhost;

        # Self-signed dev certs (mounted from nginx/certs/)
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # -----------------------------------------------------------
        # Backend API proxy (/api/* → backend:8080)
        # -----------------------------------------------------------
        location /api {
            proxy_pass http://backend:8080;
            proxy_set_header Host                  $host;
            proxy_set_header X-Real-IP             $remote_addr;
            proxy_set_header X-Forwarded-For       $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto     $scheme;

            # Connection keepalive to backend
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # -----------------------------------------------------------
        # Vite HMR WebSocket support (/hmr → frontend:3000)
        # -----------------------------------------------------------
        location /hmr {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade               $http_upgrade;
            proxy_set_header Connection            "upgrade";
            proxy_set_header Host                  $host;
            proxy_set_header X-Real-IP             $remote_addr;
            proxy_set_header X-Forwarded-For       $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto     $scheme;

            # WebSocket timeouts
            proxy_read_timeout 86400s;
        }

        # -----------------------------------------------------------
        # Frontend SPA (everything else → frontend:3000)
        # -----------------------------------------------------------
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host                  $host;
            proxy_set_header X-Real-IP             $remote_addr;
            proxy_set_header X-Forwarded-For       $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto     $scheme;

            # Enable WebSocket upgrade handling for fallback HMR
            proxy_http_version 1.1;
            proxy_set_header Upgrade               $http_upgrade;
            proxy_set_header Connection            "upgrade";
        }
    }
}
