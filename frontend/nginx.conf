# ------------------------------------------------------------------
# Nginx configuration — Production frontend
# Serves Vite React SPA, proxies /api to backend service
# ------------------------------------------------------------------

# ------------------------------------------------------------------
# WebSocket connection upgrade mapping
# Required for $connection_upgrade variable in the /api location
# ------------------------------------------------------------------

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ------------------------------------------------------------------
    # Security headers (Task 8)
    # Note: No HSTS header here — this config runs on plain HTTP (port 80)
    # with TLS termination at the edge nginx. Adding HSTS to an HTTP-only
    # server would cause browsers to preload a potentially insecure path.
    # ------------------------------------------------------------------

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://backend:8080; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), fullscreen=(self)" always;

    # ------------------------------------------------------------------
    # Gzip compression for text-based assets
    # ------------------------------------------------------------------

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ------------------------------------------------------------------
    # SPA fallback — try_files serves static files, falls back to
    # index.html so React Router client-side routing works
    # ------------------------------------------------------------------

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ------------------------------------------------------------------
    # Cache headers — long cache for versioned static assets (Vite hashes
    # filenames), no-cache for index.html so it always reloads the latest
    # ------------------------------------------------------------------

    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Security headers must be repeated in locations with their own
        # add_header directives (nginx overwrites, not appends).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://backend:8080; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), fullscreen=(self)" always;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";

        # Security headers repeated (same reason as above).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://backend:8080; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), fullscreen=(self)" always;
    }

    # ------------------------------------------------------------------
    # API reverse proxy — forward /api/* to backend Express service
    # ------------------------------------------------------------------

    location /api {
        proxy_pass http://backend:8080/api;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
